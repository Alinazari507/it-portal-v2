<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden | IT Service Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            transition: transform 0.2s;
        }

        .header {
            background: linear-gradient(135deg, #0078d4, #005a9e);
            padding: 2rem 1.5rem;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .header p {
            opacity: 0.85;
            font-size: 0.9rem;
        }

        .form-content {
            padding: 2rem 1.8rem;
        }

        .form-group {
            margin-bottom: 1.3rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e4663;
            font-size: 0.85rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            background: #fff;
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: #0078d4;
            box-shadow: 0 0 0 3px rgba(0,120,212,0.2);
        }

        .input-group i {
            padding: 0 1rem;
            color: #6c7a89;
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 0;
            border: none;
            outline: none;
            font-size: 0.9rem;
            background: transparent;
        }

        .btn-login {
            width: 100%;
            background: #0078d4;
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #005a9e;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #5a6e7c;
        }

        .register-link a {
            color: #0078d4;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .alert {
            background: #f8d7da;
            color: #721c24;
            padding: 0.75rem 1rem;
            border-radius: 60px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-note {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #6c7a89;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1><i class="fas fa-rocket"></i> IT-Service Portal</h1>
            <p>Bitte melden Sie sich mit Ihren Zugangsdaten an</p>
        </div>

        <div class="form-content">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert">
                            <i class="fas fa-exclamation-circle"></i> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label>Benutzername</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" placeholder="z.B. max.mustermann" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Passwort</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="********" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Anmelden
                </button>
            </form>

            <div class="register-link">
                Noch kein Konto? <a href="{{ url_for('register') }}">Jetzt registrieren</a>
            </div>
            <div class="info-note">
                <i class="fas fa-shield-alt"></i> DSGVO-konformer Zugang | Ihre Daten sind sicher
            </div>
        </div>
    </div>
</body>
</html>
