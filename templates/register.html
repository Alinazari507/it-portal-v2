<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierung | IT Service Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .register-container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            transition: transform 0.2s;
        }

        .header {
            background: linear-gradient(135deg, #0078d4, #005a9e);
            padding: 2rem 1.5rem;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .header p {
            opacity: 0.85;
            font-size: 0.9rem;
        }

        .form-content {
            padding: 2rem 1.8rem;
        }

        .form-group {
            margin-bottom: 1.3rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e4663;
            font-size: 0.85rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            background: #fff;
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: #0078d4;
            box-shadow: 0 0 0 3px rgba(0,120,212,0.2);
        }

        .input-group i {
            padding: 0 1rem;
            color: #6c7a89;
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 0;
            border: none;
            outline: none;
            font-size: 0.9rem;
            background: transparent;
        }

        .btn-register {
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-register:hover {
            background: #218838;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #5a6e7c;
        }

        .login-link a {
            color: #0078d4;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            background: #f8d7da;
            color: #721c24;
            padding: 0.75rem 1rem;
            border-radius: 60px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-note {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #6c7a89;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="header">
            <h1><i class="fas fa-user-plus"></i> Konto erstellen</h1>
            <p>Registrieren Sie sich für den IT-Service-Katalog</p>
        </div>

        <div class="form-content">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert">
                            <i class="fas fa-exclamation-circle"></i> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label>Benutzername *</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" placeholder="z.B. max.mustermann" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Passwort *</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="********" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Vollständiger Name *</label>
                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input type="text" name="fullname" placeholder="Max Mustermann" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Abteilung *</label>
                    <div class="input-group">
                        <i class="fas fa-building"></i>
                        <input type="text" name="department" placeholder="z.B. Logistik, IT, Vertrieb" required>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-check-circle"></i> Registrieren
                </button>
            </form>

            <div class="login-link">
                Bereits Mitglied? <a href="{{ url_for('login') }}">Jetzt anmelden</a>
            </div>
            <div class="info-note">
                <i class="fas fa-shield-alt"></i> Ihre Daten werden DSGVO-konform geschützt.
            </div>
        </div>
    </div>
</body>
</html>
